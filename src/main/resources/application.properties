spring.application.name=bank-transaction-system

spring.datasource.url=jdbc:mysql://localhost:3306/bankdb
spring.datasource.username=root
spring.datasource.password=password

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.thymeleaf.cache=false

server.port=8083
server.servlet.session.timeout=2m
server.servlet.session.tracking-modes=cookie

app.seed.admin-username=${APP_SEED_ADMIN_USERNAME:admin}
app.seed.admin-password=${APP_SEED_ADMIN_PASSWORD:}
app.seed.admin-email=${APP_SEED_ADMIN_EMAIL:admin@bank.com}
app.seed.default-password=${APP_SEED_DEFAULT_PASSWORD:}
