<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Bank Transaction System</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="login-page">

<div class="login-wrapper">
    <div class="login-box">

        <div class="login-brand">
            <div class="login-logo">&#127974;</div>
            <h2>Welcome Back</h2>
            <p class="login-subtitle">Sign in to your account</p>
        </div>

        <p th:if="${loginError}" class="error-msg">
            Invalid username or password. Please try again.
        </p>

        <p th:if="${logoutMessage}" class="flash-msg flash-success">
            You have been signed out successfully.
        </p>

        <form method="post" th:action="@{/login}" autocomplete="off">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-group">
                <label for="username">Username</label>
                <input id="username" name="username" type="text" autocomplete="username"
                       placeholder="Enter your username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" type="password" name="password" autocomplete="current-password"
                       placeholder="Enter your password" required>
            </div>

            <button type="submit">Sign In</button>
        </form>

    </div>
</div>

</body>

</html>
