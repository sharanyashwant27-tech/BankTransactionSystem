<html xmlns:th="http://www.thymeleaf.org">

<head>

<link rel="stylesheet"
href="/css/style.css">

</head>


<body>


<div class="login-box">


<h2>
Bank Login
</h2>

<p th:if="${param.error}" style="color:red;text-align:center;">
Invalid username or password.
</p>


<form method="post"
th:action="@{/login}">


<input 
name="username"
placeholder="Username">


<input
type="password"
name="password"
placeholder="Password">


<button>
Login
</button>


</form>


</div>


</body>

</html>
