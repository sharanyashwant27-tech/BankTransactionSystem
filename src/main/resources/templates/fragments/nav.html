<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<nav class="top-nav" th:classappend="${isAdmin} ? ' top-nav-compact' : ''" th:fragment="navbar(activePage)">
    <div class="nav-inner">
        <a href="/home" class="nav-brand">
            <span class="nav-brand-icon">&#127974;</span>
            <span class="nav-brand-text">
                <span class="nav-brand-title">Bank Transaction System</span>
                <span class="nav-brand-sub">Personal Banking</span>
            </span>
        </a>

        <div class="nav-actions">
            <div class="nav-links">
                <a href="/home" class="nav-link" th:classappend="${activePage == 'home'} ? 'active' : ''">Home</a>
                <a href="/transactions?tab=history" class="nav-link" th:classappend="${activePage == 'history'} ? 'active' : ''">History</a>
                <a href="/transactions?tab=transfer" class="nav-link" th:classappend="${activePage == 'transfer'} ? 'active' : ''">Transfer</a>
                <a href="/security" class="nav-link" th:classappend="${activePage == 'security'} ? 'active' : ''">Security</a>
                <a href="/spending" class="nav-link" th:classappend="${activePage == 'spending'} ? 'active' : ''">Spending</a>
                <a th:if="${isAdmin}" href="/admin" class="nav-link" th:classappend="${activePage == 'admin'} ? 'active' : ''">Administration</a>
            </div>

            <div class="nav-user-menu" th:if="${username != null}">
                <span class="nav-username">
                    <span class="nav-user-icon" th:text="${#strings.toUpperCase(#strings.substring(username,0,1))}">U</span>
                    <span th:text="${username}">user</span>
                </span>
                <form th:action="@{/logout}" method="post" class="nav-logout-form">
                    <button type="submit" class="btn btn-sm nav-logout-btn">Logout</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<script th:fragment="sessionTimeout">
    (function () {
        var timeoutMs = 120000;
        var timer;

        function redirectToSessionExpired() {
            window.location.href = '/session-expired';
        }

        function resetTimer() {
            clearTimeout(timer);
            timer = setTimeout(redirectToSessionExpired, timeoutMs);
        }

        ['mousemove', 'keydown', 'click', 'scroll', 'touchstart'].forEach(function (eventName) {
            document.addEventListener(eventName, resetTimer, { passive: true });
        });

        resetTimer();
    })();
</script>

</body>
</html>
