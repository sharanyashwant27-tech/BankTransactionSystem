<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Expired - Bank Transaction System</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="login-page session-expired-page">

<div class="login-wrapper session-expired-wrapper">
    <div class="login-box session-expired-box">
        <div class="login-brand">
            <div class="login-logo session-expired-logo">&#9203;</div>
            <span class="page-kicker page-kicker-dark">Security timeout</span>
            <h2>Session Expired</h2>
            <p class="login-subtitle">Your session ended after 2 minutes of inactivity.</p>
        </div>

        <p class="session-expired-message">
            For your security, you have been signed out. Please sign in again to continue managing your account.
        </p>

        <div class="session-expired-actions">
            <a th:href="@{/return-to-login}" class="btn btn-primary session-expired-link">Return to Login</a>
        </div>
    </div>
</div>

</body>

</html>
