<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Expired - Bank Transaction System</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="login-page session-expired-page">

<div class="login-wrapper">
    <div class="login-box session-expired-box">

        <div class="login-brand">
            <div class="login-logo">&#9203;</div>
            <h2>Session Expired</h2>
            <p class="login-subtitle">Your session ended after 2 minutes of inactivity.</p>
        </div>

        <p class="session-expired-message">
            For your security, you have been signed out. Please sign in again to continue.
        </p>

        <a th:href="@{/return-to-login}" class="session-expired-link">Return to Login</a>

    </div>
</div>

</body>

</html>
