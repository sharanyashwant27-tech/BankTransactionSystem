<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Home - Bank Transaction System</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="page-container home-page">

    <h1>Welcome to Transaction Dashboard</h1>

    <p class="user-info">You are logged in. View your personal transaction history below.</p>

</div>

</body>

</html>
