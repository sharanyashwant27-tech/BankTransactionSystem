<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Transactions - Bank Transaction System</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="page-container">

    <div class="page-header">
        <div>
            <h2>Transaction History</h2>
            <p class="user-info">Logged in as: <strong th:text="${username}">user</strong></p>
        </div>
        <a href="/home" class="btn-back">&#8592; Back to Home</a>
    </div>

    <div class="table-card">
        <table class="txn-table" th:if="${!transactions.isEmpty()}">
            <thead>
            <tr>
                <th>#</th>
                <th>Description</th>
                <th>Amount ($)</th>
                <th>Date</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="t, stat : ${transactions}">
                <td th:text="${stat.count}">1</td>
                <td th:text="${t.description}">Description</td>
                <td class="amount" th:text="${#numbers.formatDecimal(t.amount, 1, 2)}">0.00</td>
                <td th:text="${t.transactionDate}">2026-01-01</td>
            </tr>
            </tbody>
        </table>

        <p class="empty-msg" th:if="${transactions.isEmpty()}">
            No transactions found for your account.
        </p>
    </div>

</div>

</body>

</html>
