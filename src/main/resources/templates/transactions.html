<html xmlns:th="http://www.thymeleaf.org">

<body>

<h2>
Transaction History
</h2>


<table>

<tr>

<th>Description</th>

<th>Amount</th>

<th>Date</th>

</tr>


<tr th:each="t:${transactions}">

<td th:text="${t.description}">
</td>

<td th:text="${t.amount}">
</td>

<td th:text="${t.transactionDate}">
</td>


</tr>


</table>

</body>

</html>
