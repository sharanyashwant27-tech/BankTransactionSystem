<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1222"/>
      <stop offset="50%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f766e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0.7"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#lg)"/>
  <!-- City skyline -->
  <rect x="0" y="680" width="1920" height="400" fill="#0a0f1a" opacity="0.6"/>
  <rect x="80" y="520" width="120" height="560" fill="#1e293b" opacity="0.5"/>
  <rect x="220" y="420" width="90" height="660" fill="#334155" opacity="0.4"/>
  <rect x="340" y="580" width="140" height="500" fill="#1e293b" opacity="0.45"/>
  <rect x="520" y="480" width="100" height="600" fill="#475569" opacity="0.35"/>
  <rect x="660" y="550" width="160" height="530" fill="#1e293b" opacity="0.5"/>
  <rect x="860" y="380" width="110" height="700" fill="#334155" opacity="0.4"/>
  <rect x="1000" y="500" width="130" height="580" fill="#1e293b" opacity="0.45"/>
  <rect x="1160" y="440" width="95" height="640" fill="#475569" opacity="0.35"/>
  <rect x="1280" y="560" width="150" height="520" fill="#1e293b" opacity="0.5"/>
  <rect x="1460" y="490" width="100" height="590" fill="#334155" opacity="0.4"/>
  <rect x="1580" y="530" width="140" height="550" fill="#1e293b" opacity="0.45"/>
  <rect x="1740" y="600" width="120" height="480" fill="#475569" opacity="0.35"/>
  <!-- Bank building center -->
  <rect x="760" y="280" width="400" height="720" fill="#1e40af" opacity="0.25" rx="8"/>
  <rect x="800" y="320" width="320" height="680" fill="#2563eb" opacity="0.2" rx="4"/>
  <!-- Columns -->
  <rect x="820" y="400" width="40" height="500" fill="#3b82f6" opacity="0.15"/>
  <rect x="900" y="400" width="40" height="500" fill="#3b82f6" opacity="0.15"/>
  <rect x="980" y="400" width="40" height="500" fill="#3b82f6" opacity="0.15"/>
  <rect x="1060" y="400" width="40" height="500" fill="#3b82f6" opacity="0.15"/>
  <!-- Pediment -->
  <polygon points="760,280 960,180 1160,280" fill="url(#gold)" opacity="0.35"/>
  <!-- Lock / security symbol -->
  <circle cx="960" cy="620" r="80" fill="none" stroke="#06b6d4" stroke-width="4" opacity="0.4"/>
  <rect x="920" y="620" width="80" height="70" rx="8" fill="#06b6d4" opacity="0.25"/>
  <path d="M930 620 V590 Q960 560 990 590 V620" fill="none" stroke="#06b6d4" stroke-width="4" opacity="0.4"/>
  <!-- Floating coins -->
  <circle cx="200" cy="200" r="30" fill="#fbbf24" opacity="0.2"/>
  <circle cx="1700" cy="250" r="40" fill="#fbbf24" opacity="0.15"/>
  <circle cx="150" cy="400" r="20" fill="#14b8a6" opacity="0.2"/>
  <circle cx="1750" cy="450" r="25" fill="#14b8a6" opacity="0.18"/>
</svg>
