<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f9ff"/>
      <stop offset="50%" style="stop-color:#ecfdf5"/>
      <stop offset="100%" style="stop-color:#f8fafc"/>
    </linearGradient>
    <linearGradient id="row" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#tg)"/>
  <!-- Ledger table rows -->
  <g opacity="0.08">
    <rect x="200" y="180" width="1520" height="60" rx="6" fill="#2563eb"/>
    <rect x="200" y="260" width="1520" height="50" rx="4" fill="#64748b"/>
    <rect x="200" y="330" width="1520" height="50" rx="4" fill="#2563eb"/>
    <rect x="200" y="400" width="1520" height="50" rx="4" fill="#64748b"/>
    <rect x="200" y="470" width="1520" height="50" rx="4" fill="#2563eb"/>
    <rect x="200" y="540" width="1520" height="50" rx="4" fill="#64748b"/>
    <rect x="200" y="610" width="1520" height="50" rx="4" fill="#2563eb"/>
    <rect x="200" y="680" width="1520" height="50" rx="4" fill="#64748b"/>
    <rect x="200" y="750" width="1520" height="50" rx="4" fill="#2563eb"/>
    <rect x="200" y="820" width="1520" height="50" rx="4" fill="#64748b"/>
  </g>
  <!-- Receipt icons -->
  <g transform="translate(150, 300)" opacity="0.12">
    <rect width="100" height="140" rx="8" fill="white" stroke="#2563eb" stroke-width="2"/>
    <line x1="15" y1="30" x2="85" y2="30" stroke="#2563eb" stroke-width="3"/>
    <line x1="15" y1="50" x2="70" y2="50" stroke="#94a3b8" stroke-width="2"/>
    <line x1="15" y1="70" x2="80" y2="70" stroke="#94a3b8" stroke-width="2"/>
    <line x1="15" y1="90" x2="60" y2="90" stroke="#94a3b8" stroke-width="2"/>
    <text x="50" y="120" text-anchor="middle" fill="#059669" font-size="16" font-weight="bold">$</text>
  </g>
  <g transform="translate(1670, 500)" opacity="0.1">
    <rect width="100" height="140" rx="8" fill="white" stroke="#06b6d4" stroke-width="2"/>
    <line x1="15" y1="30" x2="85" y2="30" stroke="#06b6d4" stroke-width="3"/>
    <line x1="15" y1="50" x2="70" y2="50" stroke="#94a3b8" stroke-width="2"/>
    <line x1="15" y1="70" x2="80" y2="70" stroke="#94a3b8" stroke-width="2"/>
    <text x="50" y="110" text-anchor="middle" fill="#059669" font-size="16" font-weight="bold">$</text>
  </g>
  <!-- Dollar flow arrows -->
  <path d="M400 900 Q960 700 1520 900" fill="none" stroke="#059669" stroke-width="3" opacity="0.12" stroke-dasharray="12 8"/>
  <circle cx="400" cy="900" r="20" fill="#059669" opacity="0.15"/>
  <circle cx="960" cy="750" r="25" fill="#2563eb" opacity="0.12"/>
  <circle cx="1520" cy="900" r="20" fill="#059669" opacity="0.15"/>
  <!-- Trend line -->
  <polyline points="300,950 500,850 700,880 900,750 1100,800 1300,650 1500,700 1700,600" fill="none" stroke="#059669" stroke-width="5" opacity="0.1"/>
</svg>
