services:
  mysql:
    image: mysql:8.4
    container_name: bank-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: bankdb
    volumes:
      - bank-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - bank-network

  bank-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bank-app
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bankdb?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - bank-network

  analytics-service:
    build:
      context: ./analytics-service
      dockerfile: Dockerfile
    container_name: bank-analytics
    ports:
      - "8090:8090"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: bankdb
      DB_USER: root
      DB_PASSWORD: password
      SERVICE_PORT: 8090
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - bank-network

volumes:
  bank-mysql-data:

networks:
  bank-network:
    driver: bridge
